packages:
  - packages/*
  - apps/*
  - internal
  - examples

catalog:
  "@mui/material": ^9.0.0
  "@mui/utils": ^9.0.0
  "@playwright/test": ~1.58.2
  "@types/node": ^22.19.17
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  esbuild: ^0.27.7
  lightningcss: ^1.32.0
  react: ^19.2.5
  react-dom: ^19.2.5
  typescript: ~5.9.3

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - "@stratakit/*"
  - "@itwin/*"
  - "@mui/*"
  - react
  - react-dom

onlyBuiltDependencies:
  - esbuild
  - lefthook
  - sharp

overrides:
  brace-expansion@<5.0.0: ^5.0.5
  lightningcss: 1.30.1

patchedDependencies:
  lightningcss: patches/lightningcss.patch
  wireit: patches/wireit.patch
